<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>買ってよかった研究所 紹介商品まとめ</title>
<style>
:root {
  --bg: #0f0f12; --card: #1b1b21; --text: #f2f2f6; --muted: #a2a2ae;
  --accent: #FFE600; --accent-text: #1a1600; --border: #2c2c35;
  --rank-bg: #33333d; --rank-text: #d6d6de;
  --gold-bg: #f5c518; --gold-text: #241a00;
  --off-bg: #e5484d; --thumb-bg: #ffffff; --footer: #8f8f9a; --badge: #ff7b84;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f6f7f9; --card: #ffffff; --text: #1c2430; --muted: #55606e;
    --accent: #FFE600; --accent-text: #1a1600; --border: #e3e6eb;
    --rank-bg: #eef0f4; --rank-text: #444c58;
    --gold-bg: #f5c518; --gold-text: #241a00;
    --off-bg: #d6323c; --thumb-bg: #ffffff; --footer: #4a5563; --badge: #d6323c;
  }
}
* { box-sizing: border-box; }
body {
  margin: 0; padding: 12px 12px 32px; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
  font-size: 16px; line-height: 1.55; -webkit-text-size-adjust: 100%;
}
.wrap { max-width: 560px; margin: 0 auto; }
header { text-align: center; margin-bottom: 12px; }
header h1 { font-size: 1.2rem; margin: 6px 0 2px; line-height: 1.35; }
.tagline { color: var(--muted); margin: 0; font-size: 0.9rem; }
.btn {
  display: flex; align-items: center; justify-content: center; text-decoration: none;
  font-weight: 700; border-radius: 14px; padding: 12px 16px; min-height: 52px;
  margin: 10px 0; font-size: 1.02rem;
}
.btn.sale { background: var(--accent); color: var(--accent-text); }
.btn.rank {
  background: var(--card); color: var(--text); border: 2px solid var(--accent);
}
.video {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 12px; margin: 12px 0;
}
.vtitle { font-size: 1rem; font-weight: 700; margin: 0 0 2px; line-height: 1.45; }
details.video { padding: 0; }
details.video summary {
  list-style: none; cursor: pointer; display: flex; align-items: center;
  gap: 8px; min-height: 52px; padding: 12px;
}
details.video summary::-webkit-details-marker { display: none; }
details.video summary::after {
  content: "▾"; margin-left: auto; color: var(--muted); flex: none;
}
details.video[open] summary::after { content: "▴"; }
details.video .vmeta, details.video .plist { padding-left: 12px; padding-right: 12px; }
details.video .plist { padding-bottom: 12px; }
.badge {
  display: inline-block; font-size: 0.75rem; color: var(--badge);
  border: 1px solid var(--badge); border-radius: 6px; padding: 0 6px; flex: none;
}
.vmeta { color: var(--muted); font-size: 0.85rem; margin: 0 0 6px; }
.vmeta .yt { color: inherit; margin-left: 10px; }
.pcard {
  display: flex; align-items: center; gap: 10px; text-decoration: none;
  color: inherit; border: 1px solid var(--border); border-radius: 12px;
  padding: 8px; margin: 8px 0; min-height: 60px;
}
.pcard:active { border-color: var(--accent); }
.pimg {
  width: 72px; height: 72px; border-radius: 10px; background: var(--thumb-bg);
  object-fit: contain; flex: none;
}
span.pimg.ph {
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; background: var(--rank-bg);
}
.pinfo { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.prank {
  align-self: flex-start; font-size: 0.72rem; font-weight: 700;
  padding: 1px 8px; border-radius: 999px;
  background: var(--rank-bg); color: var(--rank-text);
}
.prank.gold { background: var(--gold-bg); color: var(--gold-text); }
.pname {
  font-size: 0.92rem; line-height: 1.4; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.pprice { font-size: 0.98rem; font-weight: 700; }
.poff {
  display: inline-block; font-size: 0.78rem; font-weight: 700; color: #ffffff;
  background: var(--off-bg); border-radius: 6px; padding: 0 5px; margin-left: 4px;
}
.empty { text-align: center; color: var(--muted); padding: 24px 0; }
footer {
  margin-top: 28px; padding-top: 14px; border-top: 1px solid var(--border);
  text-align: center; color: var(--footer); font-size: 12.5px; line-height: 1.7;
}
footer p { margin: 2px 0; }
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>買ってよかった研究所<br>紹介商品まとめ</h1>
  <p class="tagline">動画で紹介した商品のリンク集なのだ🫛</p>
</header>
<nav class="quick-links">
  <a class="btn sale" href="https://www.amazon.co.jp/gp/goldbox?tag=youtubeafe-22"
     target="_blank" rel="noopener sponsored">🛒 今日のAmazonタイムセール会場</a>
  <a class="btn rank" href="https://www.amazon.co.jp/gp/bestsellers?tag=youtubeafe-22"
     target="_blank" rel="noopener sponsored">👑 Amazon売れ筋ランキング</a>
</nav>
<main>
  <p class="empty">紹介した商品はまだありません。動画をお楽しみに!</p>
</main>
<footer>
  <p>© 買ってよかった研究所</p>
  <p>音声: VOICEVOX:ずんだもん</p>
  <p>※Amazonのアソシエイトとして、当チャンネルは適格販売により収入を得ています。</p>
</footer>
</div>
</body>
</html>
